  <head>
    <meta charset="UTF-8" />

    <meta name="robots" content="index,follow" />

      name="description"
      content="Pueblo La Perla Boracay is a private hillside retreat offering villas, suites, wellness arrangements, transfers, and curated island experiences minutes from Station 2."
    />
    <link rel="canonical" href="https://plp-boracay.vercel.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://plp-boracay.vercel.app/" />
    <meta property="og:title" content="Pueblo La Perla Boracay | Private Hillside Villas" />
    <meta
      property="og:description"
      content="Private villas, elevated suites, wellness, transfers, and curated island experiences in Boracay."
    />
    <meta property="og:image" content="https://plp-boracay.vercel.app/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pueblo La Perla Boracay" />
    <meta
      name="twitter:description"
      content="Private villas, elevated suites, wellness, transfers, and curated island experiences in Boracay."
    />
    <meta name="twitter:image" content="https://plp-boracay.vercel.app/og-image.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LodgingBusiness",
        "name": "Pueblo La Perla Boracay",
        "url": "https://plp-boracay.vercel.app/",
        "email": "plpvillas@gmail.com",
        "description": "Private hillside retreat in Boracay offering villas, suites, smart rooms, wellness, transfers, and curated island experiences.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Boracay",
          "addressRegion": "Aklan",
          "addressCountry": "PH"
        },
        "amenityFeature": [
          { "@type": "LocationFeatureSpecification", "name": "Private pool villas" },
          { "@type": "LocationFeatureSpecification", "name": "Wellness and in-room massage" },
          { "@type": "LocationFeatureSpecification", "name": "Port pickup and shuttle coordination" },
          { "@type": "LocationFeatureSpecification", "name": "Curated island experiences" }
        ],
        "containsPlace": [
          { "@type": "Accommodation", "name": "Grand Ocean Villa" },
          { "@type": "Accommodation", "name": "Sunset Suite" },
          { "@type": "Accommodation", "name": "Smart Room Premium" }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How do I reserve a stay at Pueblo La Perla Boracay?",
            "acceptedAnswer": { "@type": "Answer", "text": "Guests can submit a private reservation request through the website or contact the team by email. Final confirmation follows availability review and reservation verification." }
          },
          {
            "@type": "Question",
            "name": "Where is Pueblo La Perla located?",
            "acceptedAnswer": { "@type": "Answer", "text": "Pueblo La Perla is located in High Boracay, minutes from Station 2." }
          },
          {
            "@type": "Question",
            "name": "Can transfers be arranged?",
            "acceptedAnswer": { "@type": "Answer", "text": "The team can help coordinate arrival through Caticlan or Kalibo, including port pickup and transfer assistance." }
          },
          {
            "@type": "Question",
            "name": "What accommodation types are available?",
            "acceptedAnswer": { "@type": "Answer", "text": "Accommodation options include the Grand Ocean Villa, Sunset Suite, and Smart Room Premium." }
          }
        ]
      }
    </script>
    <script>
      (function () {
        var nativePushState = window.history.pushState;
        window.history.pushState = function (state, title, url) {
          if (url === '/booking' || url === 'booking') {
            window.location.href = '/booking';
            return;
          }
          return nativePushState.apply(window.history, arguments);
        };
      })();
    </script>

    <title>Pueblo La Perla Boracay</title>
  </head>
  <body>
    <div id="root"></div>

  </body>
