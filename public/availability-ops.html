<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PLP Availability Ops</title><style>body{font-family:system-ui;margin:0;background:#f8fafc;color:#0f172a}header{background:#020617;color:white;padding:28px}main{padding:28px}.card{background:white;border:1px solid #e2e8f0;border-radius:16px;padding:18px;margin-bottom:18px}input,select,button{padding:11px;border-radius:10px;border:1px solid #cbd5e1;margin:4px}button{font-weight:700;background:#020617;color:white;cursor:pointer}.danger{background:#fee2e2;color:#991b1b}.msg{padding:12px;border-radius:12px;background:#ecfdf5;color:#065f46}.err{padding:12px;border-radius:12px;background:#fee2e2;color:#991b1b}table{border-collapse:collapse;width:100%;background:white}th,td{padding:12px;border-bottom:1px solid #e2e8f0;text-align:left}th{background:#f1f5f9}</style></head><body><header><h1>PLP Availability Operations</h1><p>Manage active booking holds and manual date blocks.</p></header><main><div class="card"><input id="code" type="password" placeholder="Staff code"><select id="room"><option>Grand Ocean Villa</option><option>Sunset Suite</option><option>Smart Room Premium</option></select><input id="start" type="date"><input id="end" type="date"><input id="reason" placeholder="Reason"><button onclick="save()">Save Code</button><button onclick="addBlock()">Add Block</button><button onclick="load()">Refresh</button><div id="msg"></div></div><div class="card"><h2>Active Blocks</h2><table><thead><tr><th>Room</th><th>Dates</th><th>Reason</th><th>Action</th></tr></thead><tbody id="blocks"><tr><td colspan="4">Loading...</td></tr></tbody></table></div><div class="card"><h2>Availability Calendar</h2><table><thead><tr><th>Type</th><th>Room</th><th>Dates</th><th>Status</th><th>Reference / Reason</th></tr></thead><tbody id="cal"><tr><td colspan="5">Loading...</td></tr></tbody></table></div></main><script>const endpoint='/api/admin?action=date-blocks';const code=document.getElementById('code');code.value=localStorage.getItem('plp_staff_code')||'';function key(){return code.value||localStorage.getItem('plp_staff_code')||''}function m(t,e){document.getElementById('msg').innerHTML=t?`<p class="${e?'err':'msg'}">${t}</p>`:''}function save(){localStorage.setItem('plp_staff_code',code.value);m('Saved.');load()}async function load(){try{m('Loading...');const r=await fetch(endpoint,{headers:{'x-plp-staff-code':key()}});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'Load failed');document.getElementById('blocks').innerHTML=(d.blockedDates||[]).map(x=>`<tr><td>${x.accommodation_name}</td><td>${x.start_date} → ${x.end_date}</td><td>${x.reason||''}</td><td><button class="danger" onclick="cancelBlock('${x.id}')">Cancel</button></td></tr>`).join('')||'<tr><td colspan="4">No active blocks.</td></tr>';document.getElementById('cal').innerHTML=(d.calendar||[]).map(x=>`<tr><td>${x.source_type}</td><td>${x.accommodation_name}</td><td>${x.start_date} → ${x.end_date}</td><td>${x.status||''}</td><td>${x.reference||x.reason||''}</td></tr>`).join('')||'<tr><td colspan="5">Clear calendar.</td></tr>';m('Loaded.')}catch(e){m(e.message,true)}}async function addBlock(){try{m('Adding block...');const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','x-plp-staff-code':key()},body:JSON.stringify({accommodation:document.getElementById('room').value,startDate:document.getElementById('start').value,endDate:document.getElementById('end').value,reason:document.getElementById('reason').value})});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'Block failed');m('Block added.');load()}catch(e){m(e.message,true)}}async function cancelBlock(id){try{const r=await fetch(endpoint,{method:'PATCH',headers:{'Content-Type':'application/json','x-plp-staff-code':key()},body:JSON.stringify({id})});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'Cancel failed');m('Block cancelled.');load()}catch(e){m(e.message,true)}}load()</script></body></html>
