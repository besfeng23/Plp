<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#17130F" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>PLP Resort Command</title>
  </head>
  <body>
    <p>Opening PLP Resort Command...</p>
    <script>
      fetch('/admin-ops.html')
        .then((response) => response.text())
        .then((html) => {
          const enhanced = html.replace('</body>', '<script src="/reservation-360.js"><\\/script></body>');
          document.open();
          document.write(enhanced);
          document.close();
        })
        .catch(() => {
          window.location.href = '/admin-ops.html';
        });
    </script>
  </body>
</html>
