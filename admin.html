<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#17130F" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>PLP Resort Command</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F2EA; color: #17130F; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #F7F2EA 0%, #EFE7DA 100%); color: #17130F; -webkit-font-smoothing: antialiased; }
      .boot-shell { position: fixed; inset: 0; display: grid; grid-template-columns: 260px minmax(0, 1fr); z-index: 2; background: linear-gradient(135deg, #F7F2EA 0%, #EFE7DA 100%); }
      .boot-sidebar { border-right: 1px solid rgba(184,151,126,.28); background: rgba(255,253,248,.62); padding: 28px 22px; }
      .boot-mark { margin-bottom: 42px; }
      .boot-eyebrow { color: #B8977E; font-size: 10px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
      .boot-logo { margin-top: 7px; font-size: 18px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
      .boot-nav { display: grid; gap: 10px; }
      .boot-line { height: 38px; border-radius: 999px; background: linear-gradient(90deg, rgba(255,253,248,.95), rgba(239,231,218,.86), rgba(255,253,248,.95)); background-size: 220% 100%; animation: shimmer 1.45s ease-in-out infinite; border: 1px solid rgba(229,224,216,.72); }
      .boot-main { padding: 32px; }
      .boot-topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 28px; }
      .boot-title { width: min(420px, 64vw); }
      .boot-title .boot-line:first-child { height: 14px; width: 160px; margin-bottom: 14px; }
      .boot-title .boot-line:last-child { height: 44px; border-radius: 14px; }
      .boot-actions { display: flex; gap: 10px; }
      .boot-actions .boot-line { width: 96px; height: 42px; border-radius: 12px; }
      .boot-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 16px; margin-bottom: 24px; }
      .boot-card { min-height: 108px; border: 1px solid rgba(229,224,216,.8); border-radius: 20px; background: rgba(255,253,248,.74); padding: 18px; box-shadow: 0 18px 42px rgba(23,19,15,.04); }
      .boot-card .boot-line:first-child { height: 12px; width: 58%; margin-bottom: 22px; }
      .boot-card .boot-line:last-child { height: 32px; width: 42%; border-radius: 12px; }
      .boot-panel { min-height: 320px; border: 1px solid rgba(229,224,216,.8); border-radius: 24px; background: rgba(255,253,248,.72); padding: 22px; box-shadow: 0 18px 42px rgba(23,19,15,.04); }
      .boot-panel .boot-line { height: 16px; margin-bottom: 14px; border-radius: 10px; }
      .boot-panel .boot-line:nth-child(1) { width: 34%; }
      .boot-panel .boot-line:nth-child(2) { width: 82%; height: 42px; border-radius: 16px; margin-bottom: 26px; }
      .boot-panel .boot-line:nth-child(n+3) { width: 100%; height: 46px; border-radius: 12px; }
      .boot-status { position: fixed; left: 32px; bottom: 24px; color: #6A645B; font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; }
      #adminFrame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #F7F2EA; }
      @keyframes shimmer { 0% { background-position: 180% 0; } 100% { background-position: -40% 0; } }
      @media (max-width: 900px) { .boot-shell { grid-template-columns: 1fr; } .boot-sidebar { display: none; } .boot-main { padding: 22px 18px; } .boot-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .boot-actions { display: none; } .boot-status { left: 18px; } }
      @media (max-width: 560px) { .boot-grid { grid-template-columns: 1fr; } .boot-card:nth-child(n+3) { display: none; } .boot-title { width: 100%; } }
    </style>
  </head>
  <body>
    <iframe id="adminFrame" src="/admin-ops.html" title="PLP Resort Command"></iframe>
    <div id="bootShell" class="boot-shell" role="status" aria-live="polite" aria-label="Loading PLP Resort Command">
      <aside class="boot-sidebar" aria-hidden="true">
        <div class="boot-mark"><div class="boot-eyebrow">Pueblo La Perla</div><div class="boot-logo">Resort Command</div></div>
        <div class="boot-nav"><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div></div>
      </aside>
      <main class="boot-main" aria-hidden="true">
        <div class="boot-topbar"><div class="boot-title"><div class="boot-line"></div><div class="boot-line"></div></div><div class="boot-actions"><div class="boot-line"></div><div class="boot-line"></div></div></div>
        <div class="boot-grid"><div class="boot-card"><div class="boot-line"></div><div class="boot-line"></div></div><div class="boot-card"><div class="boot-line"></div><div class="boot-line"></div></div><div class="boot-card"><div class="boot-line"></div><div class="boot-line"></div></div><div class="boot-card"><div class="boot-line"></div><div class="boot-line"></div></div><div class="boot-card"><div class="boot-line"></div><div class="boot-line"></div></div></div>
        <section class="boot-panel"><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div><div class="boot-line"></div></section>
      </main>
      <div class="boot-status">Opening secure admin workspace</div>
    </div>
    <script>
      const frame = document.getElementById('adminFrame');
      const boot = document.getElementById('bootShell');
      frame.addEventListener('load', () => {
        try {
          const doc = frame.contentDocument;
          const r360 = doc.createElement('script');
          r360.src = '/reservation-360.js';
          doc.body.appendChild(r360);
          r360.addEventListener('load', () => {
            const workflow = doc.createElement('script');
            workflow.src = '/admin-confirmation-workflow.js';
            doc.body.appendChild(workflow);
            workflow.addEventListener('load', () => {
              const profiles = doc.createElement('script');
              profiles.src = '/guest-profile-360.js';
              doc.body.appendChild(profiles);
              profiles.addEventListener('load', () => {
                const concierge = doc.createElement('script');
                concierge.src = '/concierge-queue.js';
                doc.body.appendChild(concierge);
                concierge.addEventListener('load', () => {
                  const availability = doc.createElement('script');
                  availability.src = '/availability-board.js';
                  doc.body.appendChild(availability);
                  const qa = doc.createElement('script');
                  qa.src = '/admin-qa-polish.js';
                  doc.body.appendChild(qa);
                  qa.addEventListener('load', () => {
                    const otaReadiness = doc.createElement('script');
                    otaReadiness.src = '/ota-channel-readiness.js';
                    doc.body.appendChild(otaReadiness);
                    otaReadiness.addEventListener('load', () => {
                      const otaSyncDryRun = doc.createElement('script');
                      otaSyncDryRun.src = '/ota-sync-dry-run.js';
                      doc.body.appendChild(otaSyncDryRun);
                      otaSyncDryRun.addEventListener('load', () => {
                        const otaReservationReview = doc.createElement('script');
                        otaReservationReview.src = '/ota-reservation-review.js';
                        doc.body.appendChild(otaReservationReview);
                      });
                    });
                  });
                });
              });
            });
          });
        } catch {}
        boot.style.display = 'none';
      });
    </script>
  </body>
</html>
